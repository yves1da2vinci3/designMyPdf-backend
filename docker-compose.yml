version: '3'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      # Postgres hors compose : définir DATABASE_URL dans .env ou l'environnement hôte
      - DATABASE_URL=${DATABASE_URL}
      - CHROME_PATH=/usr/bin/chromium
      - RABBITMQ_URL=${RABBITMQ_URL}
      # Infisical (SDK) — récupère le secret FIREBASE_SERVICE_ACCOUNT au démarrage
      - INFISICAL_SITE_URL=${INFISICAL_SITE_URL}
      - INFISICAL_ENVIRONMENT=${INFISICAL_ENVIRONMENT}
      - INFISICAL_PROJECT_SLUG=${INFISICAL_PROJECT_SLUG}
      - INFISICAL_PROJECT_ID=${INFISICAL_PROJECT_ID}
      - INFISICAL_UNIVERSAL_AUTH_CLIENT_ID=${INFISICAL_UNIVERSAL_AUTH_CLIENT_ID}
      - INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET=${INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET}
      - INFISICAL_ACCESS_TOKEN=${INFISICAL_ACCESS_TOKEN}
      - INFISICAL_AUTH_ORGANIZATION_SLUG=${INFISICAL_AUTH_ORGANIZATION_SLUG}
      # Repli local sans Infisical (optionnel)
      - FIREBASE_SERVICE_ACCOUNT=${FIREBASE_SERVICE_ACCOUNT}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS}
      # Backblaze B2 (même convention que le frontend Next.js)
      - BACKBLAZE_KEY_ID=${BACKBLAZE_KEY_ID}
      - BACKBLAZE_APP_KEY=${BACKBLAZE_APP_KEY}
      - BACKBLAZE_BUCKET_NAME=${BACKBLAZE_BUCKET_NAME}
      # Anciennes variables (repli dans le code si BACKBLAZE_* vides)
      - B2_ACCOUNT_ID=${B2_ACCOUNT_ID}
      - B2_APPLICATION_KEY=${B2_APPLICATION_KEY}
      - B2_BUCKET_NAME=${B2_BUCKET_NAME}
    volumes:
      - ./uploads:/app/uploads
      - ./tmp:/app/tmp

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ['./worker']
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - CHROME_PATH=/usr/bin/chromium
      - RABBITMQ_URL=${RABBITMQ_URL}
      - BACKBLAZE_KEY_ID=${BACKBLAZE_KEY_ID}
      - BACKBLAZE_APP_KEY=${BACKBLAZE_APP_KEY}
      - BACKBLAZE_BUCKET_NAME=${BACKBLAZE_BUCKET_NAME}
      - B2_ACCOUNT_ID=${B2_ACCOUNT_ID}
      - B2_APPLICATION_KEY=${B2_APPLICATION_KEY}
      - B2_BUCKET_NAME=${B2_BUCKET_NAME}
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped
